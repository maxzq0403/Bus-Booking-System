<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - ระบบจองที่นั่ง</title>
<style>
body { font-family: Arial; text-align: center; }
.seat {
  width: 100px;
  height: 70px;
  margin: 5px;
  border: none;
  color: white;
  font-weight: bold;
}
.available { background: green; }
.booked { background: red; cursor: pointer; }
#seats { display: flex; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<h1>🔑 หน้า Admin</h1>

<div id="seats"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbycc1RorCB29Uj5a2Ex0AcH5zMddvya1-b_sbxPtyoS0Y7BiZGcIkwW9RnFgLN7Wry13Q/exec";
const ADMIN_PASSWORD = "1234"; // เปลี่ยนรหัสเอง

let pass = prompt("กรอกรหัสผ่าน Admin");
if (pass !== ADMIN_PASSWORD) {
  alert("รหัสผิด!");
  document.body.innerHTML = "Access Denied";
}

function loadSeats() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("seats");
      container.innerHTML = "";

      data.forEach(seat => {
        const btn = document.createElement("button");
        btn.classList.add("seat");

        if (seat.status === "Booked") {
          btn.classList.add("booked");
          btn.innerHTML = seat.seat + "<br>" + seat.name;
          btn.onclick = () => cancelSeat(seat.seat);
        } else {
          btn.classList.add("available");
          btn.textContent = seat.seat;
        }

        container.appendChild(btn);
      });
    });
}

function cancelSeat(seatNumber) {
  if (!confirm("ต้องการยกเลิกที่นั่ง " + seatNumber + " ?")) return;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      seat: seatNumber,
      action: "cancel"
    })
  }).then(() => loadSeats());
}

loadSeats();
</script>

</body>
</html>
